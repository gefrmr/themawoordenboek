<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Woordentrainer · met favorieten (definitief)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui; background: #f1f5f9; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .config-panel, .card { background: white; border-radius: 28px; padding: 16px; margin-bottom: 20px; }
        .status-msg { font-size: 0.75rem; padding: 8px 12px; border-radius: 40px; background: #e9f5ef; }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .woorden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
        .tile { background: white; border-radius: 24px; padding: 18px 12px; text-align: center; border: 1px solid #eef2ff; position: relative; }
        .woord-tile { background: #fef9e3; }
        .vertaling-tile { background: #f8fafc; padding-left: 32px; cursor: pointer; display: flex; flex-wrap: wrap; gap: 0; justify-content: flex-start; }
        .favorite-star { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; cursor: pointer; color: #9ca3af; background: none; border: none; }
        .favorite-star.active { color: #fbbf24; }
        .blur-suffix { filter: blur(4px); }
        .clear-suffix { filter: none; }
        .nav-buttons { display: flex; gap: 16px; margin: 16px 0 8px; }
        .nav-btn, .shuffle-btn { background: #334155; border: none; padding: 12px; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
        .small-input { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .small-input input { flex: 1; padding: 8px; border-radius: 60px; border: 1px solid #cbd5e1; }
        .small-input button { background: #475569; border: none; padding: 6px 12px; border-radius: 60px; color: white; cursor: pointer; }
        footer { font-size: 0.7rem; text-align: center; margin-top: 20px; color: #62748c; }
    </style>
</head>
<body>
<div class="container">
    <div class="config-panel">
        <div id="statusMessage" class="status-msg">🔄 Woorden worden geladen...</div>
        <div class="small-input">
            <input type="text" id="appsScriptUrlInput" placeholder="URL van Google Apps Script" value="https://script.google.com/macros/s/AKfycbzxcN_j_3At5MTdqJ0EvRzn99uzP1vKzEfSVFSqo-9ORfawzsBxPd_l_Tf6RmQ8-Fj0/exec">
            <button id="testPostBtn">🔍 Test POST (rij 2)</button>
        </div>
        <div id="endpointStatus" style="font-size:0.7rem; margin-top:5px;"></div>
        <div style="font-size:0.7rem; margin-top:10px;">⭐ Klik op ster → opslaan in kolom F van de sheet.</div>
    </div>
    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
            <span id="currentThemeName" class="thema-badge">✨ Thema</span>
            <span id="themeCounter" class="counter">0/0</span>
        </div>
        <div id="wordsGrid" class="woorden-grid"></div>
        <div class="nav-buttons">
            <button id="prevBtn" class="nav-btn">◀ Vorig</button>
            <button id="nextBtn" class="nav-btn">Volgend ▶</button>
        </div>
        <button id="randomThemeBtn" class="shuffle-btn">🎲 Willekeurig thema</button>
        <button id="reshuffleThemesBtn" class="shuffle-btn" style="background:#475569;">🔄 Nieuwe volgorde</button>
    </div>
    <footer>📖 Eerste letter duidelijk, rest geblurd · klik op vertaling om te ontbluren</footer>
</div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTr4fy7nXPC0eIsUahhSARIJiEUI_ueK0oA8KcYstpExp82gjPbpX14-L0U6iChiOTM9ikOAGBvlIgn/pub?gid=1193995968&single=true&output=csv";
    let APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxcN_j_3At5MTdqJ0EvRzn99uzP1vKzEfSVFSqo-9ORfawzsBxPd_l_Tf6RmQ8-Fj0/exec";
    
    let themeMap = new Map(), wordsMetadata = [], uniqueThemes = [], shuffledThemes = [], currentIndex = 0;
    let currentFavorites = new Map();
    const STORAGE_KEY = 'woordtrainer_favorites';
    
    const wordsGrid = document.getElementById('wordsGrid');
    const currentThemeNameSpan = document.getElementById('currentThemeName');
    const themeCounterSpan = document.getElementById('themeCounter');
    const statusMsgDiv = document.getElementById('statusMessage');
    const appsScriptUrlInput = document.getElementById('appsScriptUrlInput');
    const endpointStatusDiv = document.getElementById('endpointStatus');
    
    function setStatus(msg, isErr=false) {
        statusMsgDiv.textContent = msg;
        isErr ? statusMsgDiv.classList.add('error-msg') : statusMsgDiv.classList.remove('error-msg');
    }
    function setEndpointStatus(msg, isErr=false) {
        endpointStatusDiv.textContent = msg;
        endpointStatusDiv.style.color = isErr ? '#b91c1c' : '#2d6a4f';
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ""; }
    function shuffleArray(arr) { for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    
    function buildBlurredTranslationHtml(text) {
        if (!text) return "???";
        return text.split(',').map(p => p.trim()).filter(p=>p).map(p => {
            const first = p[0], rest = p.slice(1);
            return `<span>${escapeHtml(first)}</span>${rest ? `<span class="blur-suffix">${escapeHtml(rest)}</span>` : ''}`;
        }).join(', ');
    }
    
    function loadLocalFavorites() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const favMap = JSON.parse(stored);
                for (let [row, val] of Object.entries(favMap)) if (val) currentFavorites.set(parseInt(row), 1);
            } catch(e) {}
        }
    }
    function saveLocalFavorites() { const obj={}; for (let [k,v] of currentFavorites.entries()) obj[k]=v; localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }
    function updateLocalFavorite(rowIndex, isFav) {
        for (let item of wordsMetadata) if (item.rowIndex === rowIndex) item.favoriet = isFav?1:0;
        for (let [_, words] of themeMap.entries()) for (let w of words) if (w.rowIndex === rowIndex) w.favoriet = isFav?1:0;
        if (isFav) currentFavorites.set(rowIndex,1); else currentFavorites.delete(rowIndex);
        saveLocalFavorites();
    }
    
    async function setFavorite(rowIndex, isFavorite) {
        const url = APPS_SCRIPT_URL;
        if (!url) { updateLocalFavorite(rowIndex, isFavorite); renderCurrentTheme(); setStatus(`⭐ Lokaal ${isFavorite?'+':'-'}`, false); return; }
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rowIndex, favorite: isFavorite ? 1 : 0 })
            });
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch(e) { throw new Error(`Geen JSON: ${text.substring(0,100)}`); }
            if (json.success === true) {
                updateLocalFavorite(rowIndex, isFavorite);
                renderCurrentTheme();
                setStatus(`⭐ ${isFavorite?'Toegevoegd':'Verwijderd'} in sheet!`, false);
            } else {
                throw new Error(json.error || "Onbekend antwoord");
            }
        } catch (err) {
            console.error(err);
            setStatus(`⚠️ ${err.message} → alleen lokaal`, true);
            updateLocalFavorite(rowIndex, isFavorite);
            renderCurrentTheme();
        }
    }
    
    async function testPost() {
        const url = appsScriptUrlInput.value.trim();
        if (!url) { setEndpointStatus("❌ Geen URL", true); return; }
        setEndpointStatus("📤 Test POST met rij 2, favorite=1 ...", false);
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rowIndex: 2, favorite: 1 })
            });
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch(e) { json = text; }
            setEndpointStatus(`📥 Antwoord: ${JSON.stringify(json).substring(0,200)}`, !json?.success);
            if (json?.success) setEndpointStatus("✅ POST werkt! Favorieten worden nu opgeslagen.", false);
        } catch(e) {
            setEndpointStatus(`❌ POST fout: ${e.message}`, true);
        }
    }
    
    function processSheetData(csvRows) {
        let startIdx = 0;
        if (csvRows.length && csvRows[0][0]?.toString().toLowerCase().includes("hoofdthema")) startIdx = 1;
        const themaCol=1, woordCol=2, vertalingCol=3, favorietCol=5;
        const tempMap = new Map();
        const tempMetadata = [];
        for (let i=startIdx; i<csvRows.length; i++) {
            const row = csvRows[i];
            if (!row || row.length<4) continue;
            const thema = row[themaCol]?.toString().trim() || "";
            const woord = row[woordCol]?.toString().trim() || "";
            const vertaling = row[vertalingCol]?.toString().trim() || "";
            const favoriet = (row[favorietCol]?.toString().trim() === "1") ? 1 : 0;
            if (!thema || !woord) continue;
            const sheetRow = i+1; // 1-based (rij 1 = header)
            if (!tempMap.has(thema)) tempMap.set(thema, []);
            tempMap.get(thema).push({ woord, vertaling, favoriet, rowIndex: sheetRow });
            tempMetadata.push({ thema, woord, vertaling, favoriet, rowIndex: sheetRow });
        }
        if (tempMap.size === 0) throw new Error("Geen thema's gevonden");
        themeMap = tempMap;
        wordsMetadata = tempMetadata;
        uniqueThemes = Array.from(themeMap.keys());
        shuffledThemes = shuffleArray([...uniqueThemes]);
        currentIndex = 0;
        currentFavorites.clear();
        for (let item of wordsMetadata) if (item.favoriet === 1) currentFavorites.set(item.rowIndex, 1);
        loadLocalFavorites();
        return true;
    }
    
    function renderCurrentTheme() {
        if (!shuffledThemes.length || !themeMap.size) {
            wordsGrid.innerHTML = `<div class="tile">Geen data</div><div class="tile">Laad sheet</div>`;
            return;
        }
        const theme = shuffledThemes[currentIndex];
        const words = themeMap.get(theme) || [];
        themeCounterSpan.textContent = `${currentIndex+1}/${shuffledThemes.length}`;
        currentThemeNameSpan.textContent = theme;
        let html = "";
        for (let w of words) {
            const isFav = (w.favoriet === 1);
            html += `
                <div class="tile woord-tile">${escapeHtml(w.woord)}</div>
                <div class="tile vertaling-tile" data-row="${w.rowIndex}">
                    <button class="favorite-star ${isFav ? 'active' : ''}" data-row="${w.rowIndex}">${isFav ? '★' : '☆'}</button>
                    <span class="translation-text">${buildBlurredTranslationHtml(w.vertaling)}</span>
                </div>
            `;
        }
        wordsGrid.innerHTML = html;
        document.querySelectorAll('.vertaling-tile').forEach(tile => {
            const txtSpan = tile.querySelector('.translation-text');
            tile.addEventListener('click', (e) => {
                if (e.target.classList.contains('favorite-star')) return;
                txtSpan.querySelectorAll('.blur-suffix').forEach(s => s.classList.remove('blur-suffix'));
            });
        });
        document.querySelectorAll('.favorite-star').forEach(star => {
            star.addEventListener('click', async (e) => {
                e.stopPropagation();
                const row = parseInt(star.dataset.row);
                const newFav = !star.classList.contains('active');
                star.classList.toggle('active', newFav);
                star.textContent = newFav ? '★' : '☆';
                await setFavorite(row, newFav);
            });
        });
    }
    
    async function loadSheet() {
        setStatus("🔄 Laden...", false);
        try {
            const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const csv = await res.text();
            const parsed = Papa.parse(csv, { skipEmptyLines: true });
            processSheetData(parsed.data);
            setStatus(`✅ Geladen: ${uniqueThemes.length} thema's`, false);
            renderCurrentTheme();
        } catch(e) {
            setStatus(`Fout: ${e.message}`, true);
        }
    }
    
    function reshuffle() { if (uniqueThemes.length) { shuffledThemes = shuffleArray([...uniqueThemes]); currentIndex=0; renderCurrentTheme(); setStatus("Volgorde geschud", false); } }
    function randomTheme() { if (shuffledThemes.length) { let i = Math.floor(Math.random()*shuffledThemes.length); if (i===currentIndex && shuffledThemes.length>1) i=(i+1)%shuffledThemes.length; currentIndex=i; renderCurrentTheme(); } }
    function prevTheme() { if (shuffledThemes.length) { currentIndex = (currentIndex-1+shuffledThemes.length)%shuffledThemes.length; renderCurrentTheme(); } }
    function nextTheme() { if (shuffledThemes.length) { currentIndex = (currentIndex+1)%shuffledThemes.length; renderCurrentTheme(); } }
    
    document.getElementById('prevBtn').onclick = prevTheme;
    document.getElementById('nextBtn').onclick = nextTheme;
    document.getElementById('randomThemeBtn').onclick = randomTheme;
    document.getElementById('reshuffleThemesBtn').onclick = reshuffle;
    document.getElementById('testPostBtn').onclick = testPost;
    appsScriptUrlInput.onchange = () => { APPS_SCRIPT_URL = appsScriptUrlInput.value.trim(); localStorage.setItem('appsScriptUrl', APPS_SCRIPT_URL); setStatus("URL bijgewerkt", false); };
    
    // Laad opgeslagen URL
    if (localStorage.getItem('appsScriptUrl')) APPS_SCRIPT_URL = localStorage.getItem('appsScriptUrl');
    appsScriptUrlInput.value = APPS_SCRIPT_URL;
    
    loadSheet();
</script>
</body>
</html>
