<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woordentrainer · Favorieten werkend</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: system-ui; background: #f1f5f9; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .card, .config-panel { background: white; border-radius: 28px; padding: 16px; margin-bottom: 20px; }
        .status-msg { padding: 8px 12px; border-radius: 40px; background: #e9f5ef; }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .woorden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
        .tile { background: white; border-radius: 24px; padding: 18px 12px; position: relative; border: 1px solid #eef2ff; }
        .woord-tile { background: #fef9e3; }
        .vertaling-tile { background: #f8fafc; padding-left: 32px; cursor: pointer; display: flex; flex-wrap: wrap; gap: 0; }
        .favorite-star { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; cursor: pointer; color: #9ca3af; background: none; border: none; }
        .favorite-star.active { color: #fbbf24; }
        .blur-suffix { filter: blur(4px); }
        .clear-suffix { filter: none; }
        .nav-buttons { display: flex; gap: 16px; margin-top: 16px; }
        button { background: #334155; border: none; padding: 12px; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
        .small-input { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        input { flex: 1; padding: 8px; border-radius: 60px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
<div class="container">
    <div class="config-panel">
        <div id="statusMessage" class="status-msg">🔄 Laden...</div>
        <div class="small-input">
            <input type="text" id="appsScriptUrl" placeholder="Apps Script URL" value="">
            <button id="testPostBtn">🔍 Test POST (rij 2)</button>
        </div>
        <div id="testResult" style="font-size:0.75rem; margin-top:8px;"></div>
    </div>
    <div class="card">
        <div style="display:flex; justify-content:space-between;">
            <span id="currentTheme">✨ Thema</span>
            <span id="themeCounter">0/0</span>
        </div>
        <div id="wordsGrid" class="woorden-grid"></div>
        <div class="nav-buttons">
            <button id="prevBtn">◀ Vorig</button>
            <button id="nextBtn">Volgend ▶</button>
        </div>
        <button id="randomBtn">🎲 Willekeurig</button>
        <button id="reshuffleBtn">🔄 Nieuwe volgorde</button>
    </div>
</div>
<script>
    const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTr4fy7nXPC0eIsUahhSARIJiEUI_ueK0oA8KcYstpExp82gjPbpX14-L0U6iChiOTM9ikOAGBvlIgn/pub?gid=1193995968&single=true&output=csv";
    let APPS_SCRIPT_URL = "";
    
    let themeMap = new Map(), wordsMeta = [], themes = [], shuffled = [], idx = 0;
    let favs = new Map();
    const STORAGE_KEY = "favs";
    
    function status(msg, err=false) {
        const div = document.getElementById('statusMessage');
        div.textContent = msg;
        err ? div.classList.add('error-msg') : div.classList.remove('error-msg');
    }
    
    function loadLocalFavs() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const obj = JSON.parse(stored);
                for (let [k,v] of Object.entries(obj)) if (v) favs.set(parseInt(k),1);
            } catch(e) {}
        }
    }
    function saveLocalFavs() { const obj={}; for (let [k,v] of favs) obj[k]=v; localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }
    function updateLocal(row, isFav) {
        for (let w of wordsMeta) if (w.row === row) w.fav = isFav ? 1 : 0;
        for (let [_, list] of themeMap) for (let w of list) if (w.row === row) w.fav = isFav ? 1 : 0;
        isFav ? favs.set(row,1) : favs.delete(row);
        saveLocalFavs();
    }
    
    async function setFavorite(row, isFav) {
        if (!APPS_SCRIPT_URL) { updateLocal(row, isFav); render(); status(`⭐ Lokaal ${isFav?'+':'-'}`, false); return; }
        try {
            const res = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rowIndex: row, favorite: isFav ? 1 : 0 })
            });
            const txt = await res.text();
            let json;
            try { json = JSON.parse(txt); } catch(e) { throw new Error(txt.slice(0,100)); }
            if (json.success) {
                updateLocal(row, isFav);
                render();
                status(`⭐ ${isFav?'Toegevoegd':'Verwijderd'} in sheet`, false);
            } else throw new Error(json.error || "Onbekend");
        } catch(e) {
            status(`⚠️ ${e.message} → alleen lokaal`, true);
            updateLocal(row, isFav);
            render();
        }
    }
    
    async function testPost() {
        const url = document.getElementById('appsScriptUrl').value.trim();
        if (!url) { document.getElementById('testResult').innerText = "❌ Geen URL"; return; }
        document.getElementById('testResult').innerText = "📤 Test POST rij 2...";
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rowIndex: 2, favorite: 1 })
            });
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch(e) { json = text; }
            document.getElementById('testResult').innerHTML = `📥 Antwoord: <code>${JSON.stringify(json)}</code>`;
            if (json.success) {
                document.getElementById('testResult').style.color = "green";
                APPS_SCRIPT_URL = url;
                localStorage.setItem('appsScriptUrl', url);
            } else {
                document.getElementById('testResult').style.color = "red";
            }
        } catch(e) {
            document.getElementById('testResult').innerHTML = `❌ Fout: ${e.message}`;
            document.getElementById('testResult').style.color = "red";
        }
    }
    
    function render() {
        if (!shuffled.length) return;
        const theme = shuffled[idx];
        const words = themeMap.get(theme) || [];
        document.getElementById('currentTheme').innerText = theme;
        document.getElementById('themeCounter').innerText = `${idx+1}/${shuffled.length}`;
        let html = "";
        for (let w of words) {
            const isFav = (w.fav === 1);
            const vertHtml = w.vert.split(',').map(p=>p.trim()).filter(p=>p).map(p=>`<span>${p[0]}</span><span class="blur-suffix">${p.slice(1)}</span>`).join(', ');
            html += `
                <div class="tile woord-tile">${escapeHtml(w.woord)}</div>
                <div class="tile vertaling-tile" data-row="${w.row}">
                    <button class="favorite-star ${isFav?'active':''}" data-row="${w.row}">${isFav?'★':'☆'}</button>
                    <span class="translation-text">${vertHtml}</span>
                </div>
            `;
        }
        document.getElementById('wordsGrid').innerHTML = html;
        document.querySelectorAll('.vertaling-tile').forEach(t => {
            const span = t.querySelector('.translation-text');
            t.onclick = (e) => { if (!e.target.classList.contains('favorite-star')) span.querySelectorAll('.blur-suffix').forEach(s=>s.classList.remove('blur-suffix')); };
        });
        document.querySelectorAll('.favorite-star').forEach(star => {
            star.onclick = async (e) => {
                e.stopPropagation();
                const row = parseInt(star.dataset.row);
                const newFav = !star.classList.contains('active');
                star.classList.toggle('active', newFav);
                star.innerText = newFav ? '★' : '☆';
                await setFavorite(row, newFav);
            };
        });
    }
    
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function shuffle(a) { for (let i=a.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    
    async function loadSheet() {
        status("🔄 Laden...");
        try {
            const res = await fetch(SHEET_CSV);
            const csv = await res.text();
            const parsed = Papa.parse(csv, { skipEmptyLines: true });
            let start = 0;
            if (parsed.data[0][0]?.toLowerCase().includes("hoofdthema")) start = 1;
            const tempMap = new Map();
            const tempMeta = [];
            for (let i=start; i<parsed.data.length; i++) {
                const row = parsed.data[i];
                if (!row || row.length<4) continue;
                const thema = row[1]?.trim(), woord = row[2]?.trim(), vert = row[3]?.trim(), fav = row[5]?.trim() === "1" ? 1 : 0;
                if (!thema || !woord) continue;
                const sheetRow = i+1;
                if (!tempMap.has(thema)) tempMap.set(thema, []);
                tempMap.get(thema).push({ woord, vert, fav, row: sheetRow });
                tempMeta.push({ thema, woord, vert, fav, row: sheetRow });
            }
            if (tempMap.size === 0) throw new Error("Geen thema's");
            themeMap = tempMap;
            wordsMeta = tempMeta;
            themes = Array.from(themeMap.keys());
            shuffled = shuffle([...themes]);
            idx = 0;
            favs.clear();
            for (let w of wordsMeta) if (w.fav === 1) favs.set(w.row, 1);
            loadLocalFavs();
            render();
            status(`✅ ${themes.length} thema's geladen`);
        } catch(e) { status(`Fout: ${e.message}`, true); }
    }
    
    document.getElementById('prevBtn').onclick = () => { if (shuffled.length) idx = (idx-1+shuffled.length)%shuffled.length; render(); };
    document.getElementById('nextBtn').onclick = () => { if (shuffled.length) idx = (idx+1)%shuffled.length; render(); };
    document.getElementById('randomBtn').onclick = () => { if (shuffled.length) { let i = Math.floor(Math.random()*shuffled.length); if (i===idx && shuffled.length>1) i=(i+1)%shuffled.length; idx=i; render(); } };
    document.getElementById('reshuffleBtn').onclick = () => { if (themes.length) { shuffled = shuffle([...themes]); idx=0; render(); status("Volgorde geschud"); } };
    document.getElementById('testPostBtn').onclick = testPost;
    
    const savedUrl = localStorage.getItem('appsScriptUrl');
    if (savedUrl) document.getElementById('appsScriptUrl').value = savedUrl;
    APPS_SCRIPT_URL = savedUrl || "";
    
    loadSheet();
</script>
</body>
</html>
