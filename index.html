<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woordentrainer · bewerken & verwijderen</title>
    <style>
        /* Dezelfde stijlen als eerder – beknopt */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f1f5f9; padding: 20px 16px 40px; }
        .container { max-width: 700px; margin: 0 auto; }
        .config-panel, .card, .search-panel { background: white; border-radius: 28px; padding: 16px 18px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .status-msg { font-size: 0.75rem; padding: 8px 12px; border-radius: 40px; display: inline-block; background: #e9f5ef; }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .woorden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
        .tile { background: white; border-radius: 24px; padding: 18px 12px; text-align: center; border: 1px solid #eef2ff; }
        .woord-tile { background: #fef9e3; border-left: 6px solid #f59e0b; }
        .vertaling-tile { background: #f8fafc; border-left: 6px solid #3b82f6; cursor: pointer; }
        .action-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .action-btn { background: #e2e8f0; border: none; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; }
        .favorite-star { font-size: 1.4rem; cursor: pointer; color: #9ca3af; background: none; border: none; }
        .favorite-star.active { color: #fbbf24; }
        .blur-suffix { filter: blur(4px); }
        .clear-suffix { filter: none; }
        .nav-buttons { display: flex; gap: 16px; margin-top: 8px; }
        .nav-btn { flex: 1; background: #334155; padding: 14px; border-radius: 60px; color: white; border: none; cursor: pointer; }
        .favorites-btn, .back-btn, .search-btn { width: 100%; padding: 12px; border-radius: 60px; margin-top: 12px; border: none; font-weight: 600; cursor: pointer; }
        .favorites-btn { background: #b45309; color: white; }
        .back-btn { background: #475569; color: white; }
        .search-btn { background: #0f3b2c; color: white; }
        .search-input { flex: 1; padding: 12px; border-radius: 60px; border: 1px solid #cbd5e1; }
        .search-input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .search-results { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        .result-item { background: #f1f5f9; border-radius: 20px; padding: 12px; margin-bottom: 10px; }
        footer { font-size: 0.7rem; text-align: center; margin-top: 28px; color: #62748c; }
    </style>
</head>
<body>
<div class="container">
    <div class="search-panel">
        <div class="search-input-group">
            <input type="text" id="searchInput" class="search-input" placeholder="Zoeken...">
            <button id="searchBtn" class="search-btn">🔍 Zoek</button>
        </div>
        <div id="searchResults" class="search-results" style="display: none;"></div>
    </div>
    <div class="config-panel">
        <div id="statusMessage" class="status-msg">🔄 Laden...</div>
    </div>
    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 18px;">
            <span class="thema-badge" id="currentThemeName">✨ Thema</span>
            <span class="counter" id="themeCounter">0/0</span>
        </div>
        <div id="wordsGrid" class="woorden-grid"></div>
        <div class="nav-buttons">
            <button id="prevBtn" class="nav-btn">◀ Vorig</button>
            <button id="nextBtn" class="nav-btn">Volgend ▶</button>
        </div>
        <button id="showFavoritesBtn" class="favorites-btn">⭐ Favorieten (0)</button>
        <button id="showAllThemesBtn" class="back-btn" style="display:none;">📚 Alle thema's</button>
    </div>
    <footer>✏️ Wijzig/verwijder direct in de sheet. ⭐ Favorieten lokaal.</footer>
</div>

<script>
    // Geen WEBAPP_URL meer – we gebruiken google.script.run
    let themeMap = new Map();
    let wordsMetadata = [];
    let uniqueThemes = [];
    let shuffledThemes = [];
    let currentIndex = 0;
    let currentFavorites = new Map();
    let favoritesOnlyMode = false;
    let searchActive = false;
    let lastSearch = "";
    const STORAGE_KEY = 'woordtrainer_fav';

    function setStatus(msg, isErr) {
        const el = document.getElementById('statusMessage');
        el.textContent = msg;
        if (isErr) el.classList.add('error-msg');
        else el.classList.remove('error-msg');
    }

    function loadData() {
        setStatus("🔄 Data ophalen...");
        google.script.run
            .withSuccessHandler(processSheetData)
            .withFailureHandler(err => setStatus("Fout: " + err.message, true))
            .getSheetData();
    }

    function processSheetData(rows) {
        themeMap.clear();
        wordsMetadata = [];
        for (const row of rows) {
            const thema = (row.thema || "").trim();
            const woord = (row.woord || "").trim();
            const vertaling = (row.vertaling || "").trim();
            if (!thema || !woord) continue;
            const rowIndex = row.rowIndex;
            wordsMetadata.push({ thema, woord, vertaling, rowIndex, favoriet: 0 });
            if (!themeMap.has(thema)) themeMap.set(thema, []);
            themeMap.get(thema).push({ woord, vertaling, rowIndex, favoriet: 0 });
        }
        uniqueThemes = Array.from(themeMap.keys());
        shuffledThemes = [...uniqueThemes];
        for (let i = shuffledThemes.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledThemes[i], shuffledThemes[j]] = [shuffledThemes[j], shuffledThemes[i]];
        }
        currentIndex = 0;
        loadLocalFavorites();
        syncFavorites();
        updateFavButtonCount();
        if (searchActive) performSearch(lastSearch);
        else if (favoritesOnlyMode) renderFavorites();
        else renderCurrentTheme();
        setStatus("✅ Geladen", false);
    }

    function loadLocalFavorites() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const arr = JSON.parse(stored);
                currentFavorites.clear();
                arr.forEach(row => currentFavorites.set(row, 1));
            } catch(e) {}
        }
    }
    function saveLocalFavorites() {
        const arr = Array.from(currentFavorites.keys());
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }
    function syncFavorites() {
        wordsMetadata.forEach(item => {
            item.favoriet = currentFavorites.has(item.rowIndex) ? 1 : 0;
        });
        for (let [thema, list] of themeMap.entries()) {
            list.forEach(w => w.favoriet = currentFavorites.has(w.rowIndex) ? 1 : 0);
        }
        updateFavButtonCount();
    }
    function updateFavButtonCount() {
        const count = wordsMetadata.filter(i => i.favoriet === 1).length;
        document.getElementById('showFavoritesBtn').textContent = `⭐ Favorieten (${count})`;
    }
    function toggleFavorite(rowIndex) {
        if (currentFavorites.has(rowIndex)) currentFavorites.delete(rowIndex);
        else currentFavorites.set(rowIndex, 1);
        saveLocalFavorites();
        syncFavorites();
        if (searchActive) performSearch(lastSearch);
        else if (favoritesOnlyMode) renderFavorites();
        else renderCurrentTheme();
    }

    function buildBlurredTranslation(trans) {
        if (!trans) return "???";
        let parts = trans.split(',').map(p=>p.trim());
        let out = [];
        for (let p of parts) {
            if (!p) continue;
            let first = p[0];
            let rest = p.substring(1);
            if (rest.length === 0) out.push(`<span>${escapeHtml(first)}</span>`);
            else out.push(`<span>${escapeHtml(first)}</span><span class="blur-suffix">${escapeHtml(rest)}</span>`);
        }
        return out.join(', ');
    }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function renderCurrentTheme() {
        if (!shuffledThemes.length) return;
        const theme = shuffledThemes[currentIndex];
        const list = themeMap.get(theme) || [];
        document.getElementById('currentThemeName').textContent = theme;
        document.getElementById('themeCounter').textContent = `${currentIndex+1}/${shuffledThemes.length}`;
        let html = "";
        for (let item of list) {
            const vertHtml = buildBlurredTranslation(item.vertaling);
            const starClass = item.favoriet ? "favorite-star active" : "favorite-star";
            const starSym = item.favoriet ? "★" : "☆";
            html += `
                <div class="tile woord-tile">
                    ${escapeHtml(item.woord)}
                    <div class="action-buttons">
                        <button class="action-btn edit-word" data-row="${item.rowIndex}" data-col="3">✏️ Wijzig woord</button>
                        <button class="action-btn delete-row" data-row="${item.rowIndex}">🗑️ Verwijder</button>
                    </div>
                </div>
                <div class="tile vertaling-tile" data-row="${item.rowIndex}">
                    <span class="trans-text">${vertHtml}</span>
                    <div class="action-buttons">
                        <button class="action-btn edit-trans" data-row="${item.rowIndex}" data-col="4">✏️ Wijzig vertaling</button>
                        <button class="${starClass}" data-row="${item.rowIndex}">${starSym}</button>
                    </div>
                </div>
            `;
        }
        document.getElementById('wordsGrid').innerHTML = html;
        attachHandlers();
    }

    function renderFavorites() {
        const favs = wordsMetadata.filter(i => i.favoriet === 1);
        document.getElementById('currentThemeName').textContent = "⭐ Favorieten";
        document.getElementById('themeCounter').textContent = `${favs.length} woord(en)`;
        if (!favs.length) {
            document.getElementById('wordsGrid').innerHTML = `<div class="tile">😢 Geen favorieten</div><div class="tile">Klik op een ster</div>`;
            return;
        }
        let html = "";
        for (let item of favs) {
            const vertHtml = buildBlurredTranslation(item.vertaling);
            html += `
                <div class="tile woord-tile">
                    ${escapeHtml(item.woord)}
                    <div class="action-buttons">
                        <button class="action-btn edit-word" data-row="${item.rowIndex}" data-col="3">✏️ Wijzig woord</button>
                        <button class="action-btn delete-row" data-row="${item.rowIndex}">🗑️ Verwijder</button>
                    </div>
                </div>
                <div class="tile vertaling-tile" data-row="${item.rowIndex}">
                    <span class="trans-text">${vertHtml}</span>
                    <div class="action-buttons">
                        <button class="action-btn edit-trans" data-row="${item.rowIndex}" data-col="4">✏️ Wijzig vertaling</button>
                        <button class="favorite-star active" data-row="${item.rowIndex}">★</button>
                    </div>
                </div>
            `;
        }
        document.getElementById('wordsGrid').innerHTML = html;
        attachHandlers();
    }

    function attachHandlers() {
        // Ontblur
        document.querySelectorAll('.vertaling-tile').forEach(tile => {
            const textSpan = tile.querySelector('.trans-text');
            tile.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                textSpan.querySelectorAll('.blur-suffix').forEach(s => {
                    s.classList.remove('blur-suffix');
                    s.classList.add('clear-suffix');
                });
            });
        });
        // Ster
        document.querySelectorAll('.favorite-star').forEach(star => {
            star.addEventListener('click', (e) => {
                e.stopPropagation();
                const row = parseInt(star.dataset.row);
                toggleFavorite(row);
            });
        });
        // Wijzig woord
        document.querySelectorAll('.edit-word').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const row = parseInt(btn.dataset.row);
                const newVal = prompt("Nieuw woord:");
                if (newVal && newVal.trim()) {
                    google.script.run.withSuccessHandler(() => loadData()).updateCell(row, 3, newVal.trim());
                }
            });
        });
        // Wijzig vertaling
        document.querySelectorAll('.edit-trans').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const row = parseInt(btn.dataset.row);
                const newVal = prompt("Nieuwe vertaling:");
                if (newVal && newVal.trim()) {
                    google.script.run.withSuccessHandler(() => loadData()).updateCell(row, 4, newVal.trim());
                }
            });
        });
        // Verwijder rij
        document.querySelectorAll('.delete-row').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const row = parseInt(btn.dataset.row);
                if (confirm(`Verwijder rij ${row} definitief?`)) {
                    google.script.run.withSuccessHandler(() => loadData()).deleteRow(row);
                }
            });
        });
    }

    function performSearch(q) {
        if (!q.trim()) return;
        lastSearch = q;
        const lower = q.toLowerCase();
        const results = wordsMetadata.filter(i => i.woord.toLowerCase().includes(lower) || i.vertaling.toLowerCase().includes(lower));
        const container = document.getElementById('searchResults');
        container.style.display = "block";
        if (!results.length) container.innerHTML = `<div class="result-item">Geen resultaten voor "${escapeHtml(q)}"</div>`;
        else {
            let html = `<div><strong>${results.length} resultaten</strong></div>`;
            for (let r of results) {
                html += `<div class="result-item">
                            <strong>${escapeHtml(r.woord)}</strong> – ${escapeHtml(r.vertaling)}<br>
                            📁 ${escapeHtml(r.thema)} &nbsp; #${r.rowIndex}
                         </div>`;
            }
            container.innerHTML = html;
        }
        document.getElementById('normalView').style.display = "none";
        searchActive = true;
        document.getElementById('showFavoritesBtn').style.display = "none";
        document.getElementById('showAllThemesBtn').style.display = "block";
    }

    function clearSearch() {
        document.getElementById('searchInput').value = "";
        document.getElementById('searchResults').style.display = "none";
        document.getElementById('normalView').style.display = "block";
        searchActive = false;
        if (favoritesOnlyMode) renderFavorites();
        else renderCurrentTheme();
        document.getElementById('showFavoritesBtn').style.display = favoritesOnlyMode ? "none" : "block";
        document.getElementById('showAllThemesBtn').style.display = favoritesOnlyMode ? "block" : "none";
    }

    document.getElementById('prevBtn').onclick = () => { if(shuffledThemes.length){ currentIndex = (currentIndex-1+shuffledThemes.length)%shuffledThemes.length; renderCurrentTheme(); } };
    document.getElementById('nextBtn').onclick = () => { if(shuffledThemes.length){ currentIndex = (currentIndex+1)%shuffledThemes.length; renderCurrentTheme(); } };
    document.getElementById('showFavoritesBtn').onclick = () => { if(searchActive) clearSearch(); favoritesOnlyMode=true; renderFavorites(); document.getElementById('showFavoritesBtn').style.display='none'; document.getElementById('showAllThemesBtn').style.display='block'; };
    document.getElementById('showAllThemesBtn').onclick = () => { if(searchActive) clearSearch(); favoritesOnlyMode=false; renderCurrentTheme(); document.getElementById('showFavoritesBtn').style.display='block'; document.getElementById('showAllThemesBtn').style.display='none'; };
    document.getElementById('searchBtn').onclick = () => performSearch(document.getElementById('searchInput').value.trim());
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') performSearch(e.target.value.trim()); });

    loadData();
</script>
</body>
</html>
